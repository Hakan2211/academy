<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="480" height="320" fill="#0d1326"/>
  <!-- ground -->
  <line x1="40" y1="230" x2="440" y2="230" stroke="#2f3650" stroke-width="3"/>
  <!-- the block -->
  <rect x="200" y="150" width="80" height="80" rx="6" fill="#6c5ce7"/>
  <text x="240" y="196" fill="#ffffff" font-size="14" text-anchor="middle">m</text>

  <!-- applied force F (right) -->
  <line x1="280" y1="190" x2="400" y2="190" stroke="#ff6b6b" stroke-width="5"/>
  <polygon points="400,190 386,182 386,198" fill="#ff6b6b"/>
  <text x="358" y="178" fill="#ff6b6b" font-size="15" text-anchor="middle">F (applied)</text>

  <!-- resulting acceleration a (right, below) -->
  <line x1="280" y1="214" x2="360" y2="214" stroke="#00cec9" stroke-width="4" stroke-dasharray="2 4"/>
  <polygon points="360,214 348,208 348,220" fill="#00cec9"/>
  <text x="320" y="252" fill="#00cec9" font-size="14" text-anchor="middle">a = F / m</text>

  <!-- weight W (down) -->
  <line x1="240" y1="190" x2="240" y2="290" stroke="#74b9ff" stroke-width="4"/>
  <polygon points="240,290 232,278 248,278" fill="#74b9ff"/>
  <text x="240" y="308" fill="#74b9ff" font-size="14" text-anchor="middle">W = mg</text>

  <!-- normal N (up) -->
  <line x1="240" y1="150" x2="240" y2="70" stroke="#a0a8c0" stroke-width="4"/>
  <polygon points="240,70 232,82 248,82" fill="#a0a8c0"/>
  <text x="240" y="58" fill="#a0a8c0" font-size="14" text-anchor="middle">N</text>

  <text x="60" y="40" fill="#8a93b2" font-size="13">N and W cancel; the leftover force F is what accelerates the block.</text>
</svg>
